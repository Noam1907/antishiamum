document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<meta name=\"robots\" content=\"noindex, nofollow\">\n<link rel=\"manifest\" href=\"manifest.json\">\n<meta name=\"theme-color\" content=\"#B15CFF\">\n<meta name=\"mobile-web-app-capable\" content=\"yes\">\n<meta name=\"apple-mobile-web-app-capable\" content=\"yes\">\n<meta name=\"apple-mobile-web-app-status-bar-style\" content=\"default\">\n<meta name=\"apple-mobile-web-app-title\" content=\"אנטי שעמום\">\n<link rel=\"apple-touch-icon\" href=\"icon-192.png\">\n<title>אנטי שעמום 🎡<\/title>\n<script src=\"92611bd3-4fc3-4546-b33c-9ed0b4c56bb2\"><\/script>\n<\/head>\n<body>\n\n\n<style>\n@keyframes abg-wobble { 0%,100% { transform:translateY(0) rotate(-6deg); } 50% { transform:translateY(-10px) rotate(6deg); } }\n@keyframes abg-float { 0%,100% { transform:translateX(0); } 50% { transform:translateX(26px); } }\n@keyframes abg-pop { from { transform:scale(.6); opacity:0; } to { transform:scale(1); opacity:1; } }\n.abg-btn { border:none; border-radius:16px; font-family:inherit; font-weight:900; font-size:18px; padding:14px 26px; cursor:pointer; }\n<\/style>\n<div id=\"abGameOverlay\" dir=\"rtl\" style=\"display:none; position:fixed; inset:0; z-index:9000; overflow:hidden; font-family:'Rubik',-apple-system,sans-serif; user-select:none; -webkit-user-select:none; touch-action:manipulation;\">\n  <div style=\"position:absolute; inset:0; background:linear-gradient(180deg,#5D7DFF 0%,#8FA8FF 26%,#FFD9A8 42%,#FFB86B 50%,#7ECb7E 50.2%,#3F9E5F 100%);\"><\/div>\n  <div style=\"position:absolute; top:12%; left:14%; font-size:44px; opacity:.9; animation:abg-float 7s ease-in-out infinite;\">☁️<\/div>\n  <div style=\"position:absolute; top:22%; left:64%; font-size:34px; opacity:.85; animation:abg-float 9s ease-in-out infinite;\">☁️<\/div>\n  <div id=\"abGameSun\" style=\"position:absolute; left:50%; top:50%; transform:translate(-50%,-96%); width:88px; height:88px; border-radius:50%; background:radial-gradient(circle,#FFF3B0 0%,#FFD84D 55%,#FF9E2C 100%); box-shadow:0 0 70px 28px rgba(255,216,77,.55);\"><\/div>\n  <div style=\"position:absolute; left:0; right:0; top:50%; height:3px; background:rgba(255,255,255,.55);\"><\/div>\n  <div id=\"abgField\" style=\"position:absolute; inset:0;\"><\/div>\n\n  <div style=\"position:absolute; top:0; left:0; right:0; display:flex; align-items:center; justify-content:space-between; padding:14px 16px;\">\n    <button id=\"abgClose\" style=\"background:rgba(255,255,255,.9); border:none; width:42px; height:42px; border-radius:50%; font-size:18px; font-weight:900; cursor:pointer; color:#5A2C8A;\">✖<\/button>\n    <div style=\"display:flex; gap:10px;\">\n      <div style=\"background:rgba(255,255,255,.92); border-radius:14px; padding:8px 16px; font-weight:900; font-size:18px; color:#2D1B4E;\">👋 <span id=\"abgScore\">0<\/span><\/div>\n      <div style=\"background:rgba(255,255,255,.92); border-radius:14px; padding:8px 16px; font-weight:900; font-size:18px; color:#2D1B4E;\">⏱ <span id=\"abgTime\">30<\/span><\/div>\n    <\/div>\n  <\/div>\n\n  <div id=\"abgStart\" style=\"display:none; position:absolute; inset:0; align-items:center; justify-content:center; background:rgba(45,27,78,.45);\">\n    <div style=\"background:#fff; border-radius:26px; padding:30px 26px; max-width:330px; text-align:center; animation:abg-pop .25s ease-out; box-shadow:0 24px 60px rgba(0,0,0,.35);\">\n      <div style=\"font-size:56px;\">🥱💨🌅<\/div>\n      <div style=\"font-weight:900; font-size:22px; color:#2D1B4E; margin:10px 0 8px;\">להבריח את השיעמום!<\/div>\n      <div style=\"font-size:14.5px; color:#5A2C8A; line-height:1.5; margin-bottom:18px;\">מפלצות השיעמום השתלטו על השדה! לחצו עליהן מהר כדי להעיף אותן אל מעבר לאופק. יש לכם 30 שניות, קדימה!<\/div>\n      <button id=\"abgPlay\" class=\"abg-btn\" style=\"background:linear-gradient(120deg,#FF6FB0,#B15CFF); color:#fff; box-shadow:0 6px 0 #8A3BC0; width:100%;\">יאללה, מתחילים! 🚀<\/button>\n    <\/div>\n  <\/div>\n\n  <div id=\"abgEnd\" style=\"display:none; position:absolute; inset:0; align-items:center; justify-content:center; background:rgba(45,27,78,.45);\">\n    <div style=\"background:#fff; border-radius:26px; padding:30px 26px; max-width:330px; text-align:center; animation:abg-pop .25s ease-out; box-shadow:0 24px 60px rgba(0,0,0,.35);\">\n      <div style=\"font-size:56px;\">🌅🎉<\/div>\n      <div id=\"abgEndTxt\" style=\"font-weight:900; font-size:20px; color:#2D1B4E; margin:10px 0 6px;\"><\/div>\n      <div id=\"abgEndPts\" style=\"font-weight:900; font-size:26px; color:#FF9E2C; margin-bottom:18px;\"><\/div>\n      <button id=\"abgAgain\" class=\"abg-btn\" style=\"background:linear-gradient(120deg,#FF6FB0,#B15CFF); color:#fff; box-shadow:0 6px 0 #8A3BC0; width:100%; margin-bottom:10px;\">עוד סיבוב! 🔁<\/button>\n      <button id=\"abgDone\" class=\"abg-btn\" style=\"background:#F0E5FF; color:#5A2C8A; width:100%; font-size:15px; padding:12px;\">חזרה לאפליקציה<\/button>\n    <\/div>\n  <\/div>\n<\/div>\n<script>\n(function(){\n  var ov=document.getElementById('abGameOverlay');\n  if(!ov) return;\n  var scoreEl=document.getElementById('abgScore'), timeEl=document.getElementById('abgTime');\n  var field=document.getElementById('abgField'), startP=document.getElementById('abgStart');\n  var endP=document.getElementById('abgEnd'), endTxt=document.getElementById('abgEndTxt'), endPts=document.getElementById('abgEndPts');\n  var sun=document.getElementById('abGameSun');\n  var EMO=['🥱','😴','💤','🦥','😑','🫠'];\n  var score=0, timeLeft=30, running=false, spawnT=null, tickT=null, onAward=null, awarded=false;\n  function rnd(a,b){ return a+Math.random()*(b-a); }\n  function calcPts(){ return score>0 ? Math.max(1, Math.min(15, Math.round(score/2))) : 0; }\n  function place(m){ m.style.left=rnd(4,86)+'%'; m.style.top=rnd(55,84)+'%'; }\n  function spawn(){\n    if(!running) return;\n    if(field.querySelectorAll('.abg-mon').length>=7) return;\n    var m=document.createElement('div');\n    m.className='abg-mon';\n    m.textContent=EMO[Math.floor(Math.random()*EMO.length)];\n    m.style.cssText='position:absolute; font-size:'+Math.round(rnd(44,66))+'px; line-height:1; cursor:pointer; transition:left 1.4s linear, top 1.4s linear; filter:drop-shadow(0 4px 4px rgba(0,0,0,.25)); animation:abg-wobble '+rnd(0.8,1.4).toFixed(2)+'s ease-in-out infinite;';\n    place(m);\n    m.addEventListener('pointerdown', function(){ banish(m); });\n    field.appendChild(m);\n    m._drift=setInterval(function(){ if(m._gone){ clearInterval(m._drift); return; } place(m); }, 1400);\n  }\n  function banish(m){\n    if(m._gone || !running) return;\n    m._gone=true; clearInterval(m._drift);\n    score++; scoreEl.textContent=score;\n    var r=m.getBoundingClientRect(), sr=sun.getBoundingClientRect();\n    var dx=(sr.left+sr.width/2)-(r.left+r.width/2);\n    var dy=(sr.top+sr.height/2)-(r.top+r.height/2);\n    m.style.animation='none';\n    m.style.transition='transform .85s cubic-bezier(.45,-0.25,.6,1), opacity .85s ease-in';\n    m.style.zIndex=5;\n    requestAnimationFrame(function(){\n      m.style.transform='translate('+dx+'px,'+dy+'px) scale(.05) rotate(720deg)';\n      m.style.opacity='0';\n    });\n    setTimeout(function(){ if(m.parentNode) m.parentNode.removeChild(m); }, 900);\n  }\n  function clearMons(){\n    field.querySelectorAll('.abg-mon').forEach(function(m){ m._gone=true; clearInterval(m._drift); m.remove(); });\n  }\n  function tick(){\n    timeLeft--; timeEl.textContent=timeLeft;\n    if(timeLeft<=0) endRound();\n  }\n  function endRound(){\n    running=false; clearInterval(spawnT); clearInterval(tickT); clearMons();\n    var pts=calcPts();\n    endTxt.textContent='הברחתם '+score+' מפלצות שיעמום!';\n    endPts.textContent=pts>0 ? ('+'+pts+' ⭐') : 'נסו שוב!';\n    endP.style.display='flex';\n    if(pts>0 && onAward && !awarded){ awarded=true; onAward(pts); }\n  }\n  function 140deg,#FFD700 0%,#FF9757 100%); border:2px dashed #C8501E; border-radius:20px; padding:15px 14px; cursor:pointer; box-shadow:0 6px 0 rgba(200,90,20,.25), 0 14px 26px -14px rgba(200,90,20,.5);\" style-hover=\"transform:translateY(-3px)\" style-active=\"transform:translateY(4px); box-shadow:0 2px 0 rgba(200,90,20,.25)\">\n            <span style=\"font-size:32px; line-height:1; display:inline-block; animation:ab-wiggle 2s ease-in-out infinite;\">❓<\/span>\n            <div style=\"text-align:right;\"><div style=\"font-weight:900; font-size:15px; color:#4A1B0C;\">הפתעה!<\/div><div style=\"font-size:11px; color:#7A3A12;\">גלגלי משהו רנדומלי<\/div><\/div>\n          <\/div>\n        <\/div>\n\n        <div style=\"font-size:22px; font-weight:900; color:#5A2C8A; margin:0 0 14px; text-align:center;\">איזה תחביב עכשיו? 🎯<\/div>\n\n        <div style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:12px;\">\n          <sc-for list=\"{{ categoryTiles }}\" as=\"cat\" hint-placeholder-count=\"9\">\n            <div onclick=\"{{ cat.onClick }}\" style=\"position:relative; background:{{ cat.gradient }}; border-radius:20px; padding:14px 6px 12px; text-align:center; cursor:pointer; box-shadow:0 6px 0 rgba(60,20,90,.14), 0 12px 22px -12px rgba(60,20,90,.5); user-select:none;\" style-hover=\"transform:translateY(-4px)\" style-active=\"transform:translateY(4px); box-shadow:0 2px 0 rgba(60,20,90,.14)\">\n              <div style=\"width:52px; height:52px; margin:0 auto 7px; border-radius:50%; background:rgba(255,255,255,.55); display:flex; align-items:center; justify-content:center; font-size:30px; line-height:1; box-shadow:inset 0 2px 6px rgba(255,255,255,.6);\">{{ cat.emoji }}<\/div>\n              <div style=\"font-weight:800; font-size:13px; color:{{ cat.textColor }}; line-height:1.2;\">{{ cat.name }}<\/div>\n              <sc-if value=\"{{ cat.custom }}\" hint-placeholder-val=\"{{ false }}\">\n                <button onclick=\"{{ cat.onDelete }}\" style=\"position:absolute; top:5px; left:5px; background:rgba(255,255,255,.85); color:#C62828; border:none; width:24px; height:24px; border-radius:50%; font-size:14px; font-weight:bold; cursor:pointer; line-height:1;\">×<\/button>\n              <\/sc-if>\n              <sc-if value=\"{{ cat.locked }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"position:absolute; top:6px; right:6px; background:rgba(255,255,255,.9); border-radius:50%; width:26px; height:26px; display:flex; align-items:center; justify-content:center; font-size:14px; box-shadow:0 2px 6px rgba(60,20,90,.25);\">🔒<\/div>\n              <\/sc-if>\n            <\/div>\n          <\/sc-for>\n\n          <div onclick=\"{{ openAddModal }}\" style=\"display:flex; flex-direction:column; align-items:center; justify-content:center; background:rgba(255,255,255,.5); border:3px dashed #B896D8; border-radius:20px; padding:14px 6px; text-align:center; cursor:pointer; color:#5A2C8A; font-weight:800; font-size:12.5px; min-height:104px;\" style-hover=\"background:rgba(255,255,255,.9); transform:translateY(-2px)\">\n            <div style=\"font-size:30px; line-height:1; margin-bottom:2px;\">➕<\/div>\n            <div>הוסיפי תחביב<\/div>\n          <\/div>\n        <\/div>\n      <\/div>\n    <\/sc-if>\n\n    <div style=\"text-align:center; padding:26px 0 8px; font-size:13px; color:#8A6FA8;\">\n      <span onclick=\"{{ goToWelcome }}\" style=\"cursor:pointer; text-decoration:underline;\">🏠 חזרה למסך הפתיחה<\/span><br><br>\n      נבנה על ידי: {{ ownerName }} 💜<br>\n      <span style=\"display:inline-block; max-width:300px; font-size:11.5px; line-height:1.5; color:#A896C0; margin-top:6px;\">גילוי נאות: רוב ההוראות בלשון נקבה, כי עלמה בנתה 😄 בנים, זה בדיוק בשבילכם גם!<\/span>\n    <\/div>\n  <\/div>\n\n  <!-- ACTIVITY MODAL -->\n  <sc-if value=\"{{ activityOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div onclick=\"{{ onOverlayClick }}\" data-overlay=\"1\" style=\"position:fixed; inset:0; background:rgba(45,27,78,.62); z-index:100; display:flex; align-items:center; justify-content:center; padding:20px; animation:ab-fade .2s; backdrop-filter:blur(2px);\">\n      <div style=\"background:#fff; border-radius:30px; max-width:400px; width:100%; text-align:center; animation:ab-pop .3s; box-shadow:0 30px 70px -20px rgba(45,27,78,.75); overflow:hidden; max-height:94vh; overflow-y:auto;\">\n\n        <!-- tinted header -->\n        <div style=\"background:{{ modalBg }}; padding:20px 24px 16px;\">\n          <div style=\"width:64px; height:64px; margin:0 auto 6px; border-radius:50%; background:rgba(255,255,255,.6); display:flex; align-items:center; justify-content:center; font-size:36px; line-height:1; box-shadow:0 8px 18px -8px rgba(0,0,0,.3);\">{{ modalEmoji }}<\/div>\n          <div style=\"font-size:16px; color:#3A1D5C; font-weight:900;\">{{ modalName }}<\/div>\n        <\/div>\n\n        <div style=\"padding:22px 24px 26px;\">\n          <!-- prize wheel -->\n          <div style=\"position:relative; width:100%; max-width:290px; margin:0 auto 22px; aspect-ratio:1;\">\n            <div style=\"position:absolute; inset:-6px; border-radius:50%; background:radial-gradient(circle, rgba(255,215,0,.4), transparent 68%); filter:blur(7px);\"><\/div>\n            <div style=\"position:absolute; inset:0; border-radius:50%; padding:9px; background:linear-gradient(135deg,#fff,#F1EAFB); box-shadow:0 16px 38px -14px rgba(45,27,78,.55), inset 0 0 0 2px rgba(255,255,255,.9);\">\n              <div id=\"wheelBox\" style=\"width:100%; height:100%;\"><\/div>\n            <\/div>\n            <div style=\"position:absolute; top:-9px; left:50%; transform:translateX(-50%) rotate(45deg); width:28px; height:28px; background:var(--accent); border:3px solid #fff; border-radius:50% 50% 50% 0; z-index:12; box-shadow:0 4px 8px -2px rgba(0,0,0,.4);\"><\/div>\n            <div style=\"position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:56px; height:56px; border-radius:50%; background:linear-gradient(140deg,var(--accent),var(--accent-dark)); border:4px solid #fff; display:flex; align-items:center; justify-content:center; font-size:23px; z-index:6; box-shadow:0 6px 16px -6px rgba(0,0,0,.5);\">🎯<\/div>\n          <\/div>\n\n          <sc-if value=\"{{ showSpin }}\" hint-placeholder-val=\"{{ true }}\">\n            <button onclick=\"{{ spinWheel }}\" disabled=\"{{ spinning }}\" style=\"background:var(--accent); color:#fff; font-weight:900; font-size:18px; padding:15px 42px; border:none; border-radius:18px; box-shadow:0 6px 0 var(--accent-dark); cursor:pointer; font-family:inherit;\" style-active=\"transform:translateY(4px); box-shadow:0 2px 0 var(--accent-dark)\">{{ spinLabel }}<\/button>\n          <\/sc-if>\n\n          <sc-if value=\"{{ resultShown }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"margin-top:2px;\">\n              <div style=\"display:inline-block; font-size:12px; font-weight:800; letter-spacing:1px; color:#fff; background:var(--accent); padding:5px 16px; border-radius:20px; box-shadow:0 6px 14px -6px var(--accent);\">🎉 יצא לך<\/div>\n              <div style=\"background:linear-gradient(150deg,#FFF7FC,#F3ECFF); border:2px solid #EEDBFA; border-radius:20px; padding:16px 14px; margin:12px 0;\">\n                <div style=\"font-size:24px; font-weight:900; color:#5A2C8A; line-height:1.25;\">{{ resultText }}<\/div>\n              <\/div>\n              <div style=\"font-size:13.5px; color:#5B4A78; background:#F6F1FC; border-radius:14px; padding:12px 14px; margin-bottom:16px; text-align:right; line-height:1.6;\">💡 {{ resultTip }}<\/div>\n              <div style=\"display:flex; flex-direction:column; gap:9px;\">\n                <button onclick=\"{{ finishActivity }}\" style=\"background:var(--accent); color:#fff; font-weight:900; font-size:19px; padding:16px; border:none; border-radius:16px; cursor:pointer; font-family:inherit; box-shadow:0 6px 0 var(--accent-dark);\" style-active=\"transform:translateY(4px); box-shadow:0 2px 0 var(--accent-dark)\">סיימתי! +{{ award }} ⭐<\/button>\n                <div style=\"display:flex; gap:9px;\">\n                  <button onclick=\"{{ skipActivity }}\" style=\"flex:1; background:#F0E5FF; color:#5A2C8A; font-weight:700; font-size:14px; padding:13px 8px; border:none; border-radius:14px; cursor:pointer; font-family:inherit; line-height:1.3;\">🙅 תני/תן לי אחר<\/button>\n                  <button onclick=\"{{ resetWheel }}\" style=\"flex:1; background:#F0E5FF; color:#5A2C8A; font-weight:700; font-size:14px; padding:13px 8px; border:none; border-radius:14px; cursor:pointer; font-family:inherit; line-height:1.3;\">🎡 סובבי שוב<\/button>\n                <\/div>\n              <\/div>\n            <\/div>\n          <\/sc-if>\n\n          <div style=\"margin-top:14px;\"><button onclick=\"{{ closeModal }}\" style=\"background:transparent; color:#7B5B96; text-decoration:underline; border:none; padding:8px; font-size:14px; cursor:pointer; font-family:inherit;\">סגירה<\/button><\/div>\n        <\/div>\n      <\/div>\n    <\/div>\n  <\/sc-if>\n\n  <!-- LEVEL UP MODAL -->\n  <sc-if value=\"{{ levelUpOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div onclick=\"{{ onOverlayClick }}\" data-overlay=\"1\" style=\"position:fixed; inset:0; background:rgba(45,27,78,.62); z-index:100; display:flex; align-items:center; justify-content:center; padding:20px; animation:ab-fade .2s; backdrop-filter:blur(2px);\">\n      <div style=\"background:linear-gradient(160deg,#2D1B4E 0%,#4A2A6B 100%); color:#F0E5FF; border-radius:30px; padding:30px 24px; max-width:480px; width:100%; text-align:center; animation:ab-pop .3s; box-shadow:0 30px 70px -20px rgba(45,27,78,.8); max-height:88vh; overflow-y:auto;\">\n\n        <sc-if value=\"{{ showLevelMenu }}\" hint-placeholder-val=\"{{ true }}\">\n          <div>\n            <div style=\"font-size:60px; margin-bottom:8px; line-height:1;\">🚀<\/div>\n            <div style=\"color:#FFD700; font-size:24px; font-weight:900; margin-bottom:6px;\">להגדיל ראש<\/div>\n            <div style=\"font-size:14px; color:#D9C7F0; margin-bottom:20px;\">דברים מגניבים שלא תמצאי בשום אפליקציה אחרת<\/div>\n            <div style=\"display:grid; grid-template-columns:repeat(2,1fr); gap:12px;\">\n              <div onclick=\"{{ showCode }}\" style=\"background:rgba(255,255,255,.08); border:2px solid rgba(255,215,0,.3); border-radius:18px; padding:18px 10px; cursor:pointer; font-size:14px; font-weight:700;\" style-hover=\"background:rgba(255,255,255,.16); transform:translateY(-3px)\"><div style=\"font-size:32px; margin-bottom:6px;\">🤖<\/div><div>קוד ובינה מלאכותית<\/div><\/div>\n              <div onclick=\"{{ showDance }}\" style=\"background:rgba(255,255,255,.08); border:2px solid rgba(255,215,0,.3); border-radius:18px; padding:18px 10px; cursor:pointer; font-size:14px; font-weight:700;\" style-hover=\"background:rgba(255,255,255,.16); transform:translateY(-3px)\"><div style=\"font-size:32px; margin-bottom:6px;\">🕺<\/div><div>ריקוד לבד בבית<\/div><\/div>\n              <div onclick=\"{{ showVideo }}\" style=\"background:rgba(255,255,255,.08); border:2px solid rgba(255,215,0,.3); border-radius:18px; padding:18px 10px; cursor:pointer; font-size:14px; font-weight:700;\" style-hover=\"background:rgba(255,255,255,.16); transform:translateY(-3px)\"><div style=\"font-size:32px; margin-bottom:6px;\">🎬<\/div><div>סרטונים מגניבים<\/div><\/div>\n              <div onclick=\"{{ showMusic }}\" style=\"background:rgba(255,255,255,.08); border:2px solid rgba(255,215,0,.3); border-radius:18px; padding:18px 10px; cursor:pointer; font-size:14px; font-weight:700;\" style-hover=\"background:rgba(255,255,255,.16); transform:translateY(-3px)\"><div style=\"font-size:32px; margin-bottom:6px;\">🎹<\/div><div>מוזיקה בכלי נגינה<\/div><\/div>\n              <div onclick=\"{{ showReferral }}\" style=\"grid-column:span 2; background:rgba(255,255,255,.08); border:2px solid rgba(255,215,0,.3); border-radius:18px; padding:18px 10px; cursor:pointer; font-size:14px; font-weight:700;\" style-hover=\"background:rgba(255,255,255,.16); transform:translateY(-3px)\"><div style=\"font-size:32px; margin-bottom:6px;\">💰<\/div><div>תזמיני חברות ותרוויחי נקודות<\/div><\/div>\n            <\/div>\n            <button onclick=\"{{ closeLevelUp }}\" style=\"margin-top:18px; background:transparent; color:#D9C7F0; text-decoration:underline; border:none; padding:8px; font-size:14px; cursor:pointer; font-family:inherit;\">סגירה<\/button>\n          <\/div>\n        <\/sc-if>\n\n        <sc-if value=\"{{ showLevelTopic }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"text-align:right;\">\n            <sc-if value=\"{{ topicCode }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"text-align:center;\"><div style=\"font-size:56px; line-height:1;\">🤖<\/div><div style=\"color:#FFD700; font-size:20px; font-weight:900; margin:8px 0 16px;\">קוד ובינה מלאכותית<\/div><\/div>\n              <div style=\"font-size:14px; line-height:1.7; color:#F0E5FF;\">\n                את בעצם כבר משתמשת ב-AI עכשיו - האפליקציה הזאת נבנתה עם קלוד! הנה איך להתחיל בעצמך:\n                <h4 style=\"color:#FFD700; font-size:16px; margin:14px 0 6px;\">שלב 1 - תרגלי לתת הוראות<\/h4>\n                תפתחי שיחה עם קלוד ותבקשי ממנו לבנות לך משהו קטן, כמו \"תבנה לי דף עם התמונה האהובה עליי ומשפט שאני אוהבת\". ככל שההוראה מדויקת יותר - התוצאה יותר טובה.\n                <h4 style=\"color:#FFD700; font-size:16px; margin:14px 0 6px;\">שלב 2 - למדי מה זה קוד בכלל<\/h4>\n                קוד זה בעצם הוראות למחשב, כמו מתכון בישול - שלב אחרי שלב. אתרים כמו Scratch (סקראץ') מלמדים תכנות בעזרת גרירת קוביות צבעוניות, בלי לכתוב מילים באנגלית קשות.\n                <h4 style=\"color:#FFD700; font-size:16px; margin:14px 0 6px;\">שלב 3 - בני משהו קטן משלך<\/h4>\n                תרגילי לבנות משחק פשוט בסקראץ׳, כמו חתול שקופץ מעל מכשולים. זה בדיוק אותו עיקרון כמו האפליקציה הזאת - רק בקטן.\n              <\/div>\n            <\/sc-if>\n            <sc-if value=\"{{ topicDance }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"text-align:center;\"><div style=\"font-size:56px; line-height:1;\">🕺<\/div><div style=\"color:#FFD700; font-size:20px; font-weight:900; margin:8px 0 16px;\">ריקוד לבד בבית<\/div><\/div>\n              <div style=\"font-size:14px; line-height:1.7; color:#F0E5FF;\">\n                <h4 style=\"color:#FFD700; font-size:16px; margin:14px 0 6px;\">שלב 1 - תחממי את הגוף<\/h4>\n                2 דקות של קפיצות קלות וניעור ידיים ורגליים, כדי לא להיפצע.\n                <h4 style=\"color:#FFD700; font-size:16px; margin:14px 0 6px;\">שלב 2 - תלמדי צעד אחד בכל פעם<\/h4>\n                אל תנסי ללמוד ריקוד שלם בבת אחת. תבחרי סרטון קצר (30-60 שניות) עם צעד אחד, תראי אותו כמה פעמים, ואז תנסי לחקות בלי מוזיקה קודם, ורק אחר כך עם המוזיקה.\n                <h4 style=\"color:#FFD700; font-size:16px; margin:14px 0 6px;\">שלב 3 - תצלמי את עצמך<\/h4>\n                זה נשמע מוזר אבל זה הכי עוזר - תצלמי את עצמך רוקדת ותראי מה יוצא. רקדניות מקצועיות עושות בדיוק את זה.\n                <h4 style=\"color:#FFD700; font-size:16px; margin:14px 0 6px;\">שלב 4 - תמציאי משהו משלך<\/h4>\n                אחרי שלמדת כמה צעדים - תנסי לחבר אותם ברצף משלך. זה מה שהופך אותך לרקדנית ולא רק למחקה.\n              <\/div>\n            <\/sc-if>\n            <sc-if value=\"{{ topicVideo }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"text-align:center;\"><div style=\"font-size:56px; line-height:1;\">🎬<\/div><div style=\"color:#FFD700; font-size:20px; font-weight:900; margin:8px 0 16px;\">סרטונים מגניבים<\/div><\/div>\n              <div style=\"font-size:14px; line-height:1.7; color:#F0E5FF;\">\n                <h4 style=\"color:#FFD700; font-size:16px; margin:14px 0 6px;\">הטיפ שהכי משנה הכל - אור<\/h4>\n                תמיד תצלמי כשהאור מולך (ליד חלון למשל), לא מאחורייך. זה ההבדל הכי גדול בין סרטון חובבני למקצועי.\n                <h4 style=\"color:#FFD700; font-size:16px; margin:14px 0 6px;\">סטופ-מושן קסום<\/h4>\n                תצלמי עצמים שזזים לאט לאט, תמונה אחרי תמונה (בלי לזוז את המצלמה), ואז תחברי הכל לסרטון רץ - נראה כמו קסם.\n                <h4 style=\"color:#FFD700; font-size:16px; margin:14px 0 6px;\">מעברים חלקים<\/h4>\n                תרגילי \"מעבר\" - למשל את מכסה את המצלמה ביד, ואז בתמונה הבאה משהו כבר השתנה (בגד, מקום). כשמחברים את זה נראה כמו טריק קסמים.\n                <h4 style=\"color:#FFD700; font-size:16px; margin:14px 0 6px;\">עריכה<\/h4>\n                תוסיפי מוזיקה בקצב שמתאים לתנועה בסרטון - כשהקצב עולה, שהתנועה תהיה יותר מהירה.\n              <\/div>\n            <\/sc-if>\n            <sc-if value=\"{{ topicMusic }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"text-align:center;\"><div style=\"font-size:56px; line-height:1;\">🎹<\/div><div style=\"color:#FFD700; font-size:20px; font-weight:900; margin:8px 0 16px;\">מוזיקה בכלי נגינה<\/div><\/div>\n              <div style=\"font-size:14px; line-height:1.7; color:#F0E5FF;\">\n                תרשמי שם של שיר שאת רוצה ללמוד לנגן, ותקבלי דרך פעולה:\n                <div style=\"display:flex; gap:8px; margin:12px 0;\">\n                  <input id=\"songNameInput\" type=\"text\" placeholder=\"למשל: עונת הניצנים\" style=\"flex:1; padding:10px 12px; border-radius:12px; border:none; font-family:inherit; font-size:14px; text-align:right; outline:none;\">\n                  <button onclick=\"{{ generateSongGuide }}\" style=\"background:#FFD700; color:#2D1B4E; font-weight:800; border:none; border-radius:12px; padding:10px 16px; cursor:pointer; font-family:inherit;\">קבלי מדריך<\/button>\n                <\/div>\n                <sc-if value=\"{{ songGuideName }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"font-size:14px; line-height:1.7; margin-top:6px;\">\n                    <h4 style=\"color:#FFD700; font-size:16px; margin:8px 0 6px;\">המדריך שלך ל\"{{ songGuideName }}\"<\/h4>\n                    <ul style=\"padding-right:20px; margin:6px 0;\">\n                      <li>יש לך תווים כתובים? חפשי ביוטיוב \"{{ songGuideName }} תווים לפסנתר למתחילים\" - הרבה שירים כבר יש להם תווים מוכנים ברשת.<\/li>\n                      <li>אין תווים? חפשי ביוטיוב \"{{ songGuideName }} piano tutorial\" - יש המון סרטונים שמראים בדיוק על אילו קלידים ללחוץ, גם בלי לדעת לקרוא תווים.<\/li>\n                      <li>תלמדי יד ימין קודם (המנגינה) לבד, עד שהיא יוצאת חלק - רק אז תוסיפי את יד שמאל (הליווי).<\/li>\n                      <li>תחלקי את השיר ל-4 חלקים קטנים ותלמדי חלק אחד בכל פעם, לא את כל השיר בבת אחת.<\/li>\n                      <li>תתרגלי כל חלק לאט לאט קודם, ורק כשהוא יוצא בלי טעויות - תאיצי לקצב האמיתי.<\/li>\n                    <\/ul>\n                  <\/div>\n                <\/sc-if>\n              <\/div>\n            <\/sc-if>\n            <sc-if value=\"{{ topicReferral }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"text-align:center;\"><div style=\"font-size:56px; line-height:1;\">💰<\/div><div style=\"color:#FFD700; font-size:20px; font-weight:900; margin:8px 0 16px;\">תזמיני חברות ותרוויחי<\/div><\/div>\n              <div style=\"font-size:14px; line-height:1.7; color:#F0E5FF;\">\n                <h4 style=\"color:#FFD700; font-size:16px; margin:8px 0 6px;\">איך זה עובד<\/h4>\n                לכל חברה שנכנסת עם הקוד האישי שלך - שתיכן מקבלות 100 נקודות בונוס! ברגע שיהיה לך הרבה נקודות, אפשר לדבר עם ההורים על להפוך אותן לכסף אמיתי או פרס - זה כבר תלוי בהם כי זה דורש חשבון בנק.\n                <h4 style=\"color:#FFD700; font-size:16px; margin:14px 0 6px;\">הקוד האישי שלך<\/h4>\n                <div style=\"background:rgba(255,215,0,.15); border-radius:12px; padding:12px; text-align:center; font-size:22px; font-weight:900; color:#FFD700; margin:10px 0;\">{{ referralCode }}<\/div>\n                <h4 style=\"color:#FFD700; font-size:16px; margin:14px 0 6px;\">חברות שהצטרפו<\/h4>\n                <div style=\"font-size:15px;\">{{ referralCountText }}<\/div>\n                <div style=\"display:flex; gap:8px; margin-top:10px;\">\n                  <input id=\"referralFriendInput\" type=\"text\" placeholder=\"שם חברה שהצטרפה\" style=\"flex:1; padding:10px 12px; border-radius:12px; border:none; font-family:inherit; font-size:14px; text-align:right; outline:none;\">\n                  <button onclick=\"{{ addReferral }}\" style=\"background:#FFD700; color:#2D1B4E; font-weight:800; border:none; border-radius:12px; padding:10px 16px; cursor:pointer; font-family:inherit;\">הוסיפי<\/button>\n                <\/div>\n              <\/div>\n            <\/sc-if>\n            <div style=\"margin-top:16px;\"><button onclick=\"{{ backToLevelUpMenu }}\" style=\"background:rgba(255,255,255,.1); color:#F0E5FF; font-weight:700; padding:14px 20px; border:none; border-radius:16px; cursor:pointer; font-family:inherit; font-size:15px;\">⬅️ חזרה<\/button><\/div>\n          <\/div>\n        <\/sc-if>\n      <\/div>\n    <\/div>\n  <\/sc-if>\n\n  <!-- UNLOCK MODAL (taste-then-pay) -->\n  <sc-if value=\"{{ unlockOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div onclick=\"{{ onOverlayClick }}\" data-overlay=\"1\" style=\"position:fixed; inset:0; background:rgba(45,27,78,.62); z-index:100; display:flex; align-items:center; justify-content:center; padding:20px; animation:ab-fade .2s; backdrop-filter:blur(2px);\">\n      <div style=\"background:#fff; border-radius:30px; padding:30px 24px; max-width:400px; width:100%; text-align:center; animation:ab-pop .3s; box-shadow:0 30px 70px -20px rgba(45,27,78,.7);\">\n        <div style=\"font-size:56px; line-height:1;\">🔒<\/div>\n        <div style=\"font-size:22px; font-weight:900; color:#5A2C8A; margin:10px 0 6px;\">הגלגל הזה עדיין נעול!<\/div>\n        <div style=\"font-size:15px; color:#5B4A78; line-height:1.7; margin-bottom:16px;\">\n          רוצים לפתוח את <b>כל הגלגלים<\/b>? 🎡<br>\n          זה עולה רק 10₪.<br>\n          שלחו לנו מייל, נסביר איך משלמים ותקבלו קוד סודי 💜\n        <\/div>\n        <button onclick=\"{{ emailForCode }}\" style=\"background:#25D366; color:#fff; font-weight:900; font-size:17px; padding:15px; border:none; border-radius:16px; cursor:pointer; font-family:inherit; width:100%; box-shadow:0 6px 0 #128C46; margin-bottom:14px;\" style-active=\"transform:translateY(4px); box-shadow:0 2px 0 #128C46\">📧 שלחו לנו מייל לפתיחה<\/button>\n        <div style=\"font-size:13px; color:#8A79A6; margin-bottom:10px;\">כבר יש לכם קוד? הכניסו אותו כאן:<\/div>\n        <input id=\"unlockCodeInput\" type=\"text\" placeholder=\"הקוד הסודי\" autocomplete=\"off\" style=\"width:100%; padding:14px; border-radius:14px; border:2px solid #E0D0F0; font-family:inherit; font-size:18px; font-weight:800; margin-bottom:10px; direction:ltr; text-align:center; letter-spacing:2px; outline:none;\">\n        <sc-if value=\"{{ unlockError }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"font-size:14px; font-weight:700; color:#C62828; margin-bottom:10px;\">הקוד לא נכון 🙈 נסו שוב או תשאלו את עלמה<\/div>\n        <\/sc-if>\n        <div style=\"display:flex; flex-direction:column; gap:10px;\">\n          <button onclick=\"{{ tryUnlock }}\" style=\"background:var(--accent); color:#fff; font-weight:900; font-size:18px; padding:16px; border:none; border-radius:16px; cursor:pointer; font-family:inherit; box-shadow:0 6px 0 var(--accent-dark);\" style-active=\"transform:translateY(4px); box-shadow:0 2px 0 var(--accent-dark)\">פתחו לי הכל! 🎉<\/button>\n          <button onclick=\"{{ closeUnlockModal }}\" style=\"background:transparent; color:#7B5B96; text-decoration:underline; border:none; padding:8px; font-size:14px; cursor:pointer; font-family:inherit;\">אולי אחר כך<\/button>\n        <\/div>\n      <\/div>\n    <\/div>\n  <\/sc-if>\n\n  <!-- INSTALL GUIDE MODAL -->\n  <sc-if value=\"{{ installOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div onclick=\"{{ onOverlayClick }}\" data-overlay=\"1\" style=\"position:fixed; inset:0; background:rgba(45,27,78,.62); z-index:100; display:flex; align-items:center; justify-content:center; padding:20px; animation:ab-fade .2s; backdrop-filter:blur(2px);\">\n      <div style=\"background:#fff; border-radius:30px; padding:28px 24px; max-width:400px; width:100%; text-align:center; animation:ab-pop .3s; box-shadow:0 30px 70px -20px rgba(45,27,78,.7);\">\n        <div style=\"font-size:50px; line-height:1;\">📲<\/div>\n        <div style=\"font-size:21px; font-weight:900; color:#5A2C8A; margin:8px 0 4px;\">התקינו כאפליקציה<\/div>\n        <div style=\"font-size:14px; color:#5B4A78; line-height:1.6; margin-bottom:16px;\">ככה אנטי שיעמום יופיע כמו אפליקציה אמיתית על המסך, עם אייקון משלו 🎡<\/div>\n        <div style=\"text-align:right; background:#F6F1FC; border-radius:16px; padding:14px 16px; margin-bottom:12px;\">\n          <div style=\"font-weight:900; color:#5A2C8A; font-size:15px; margin-bottom:4px;\">📱 אייפון · Safari<\/div>\n          <div style=\"font-size:14px; color:#5B4A78; line-height:1.7;\">לוחצים על כפתור השיתוף למטה, בוחרים \"הוסף למסך הבית\", ואז \"הוסף\".<\/div>\n        <\/div>\n        <div style=\"text-align:right; background:#F6F1FC; border-radius:16px; padding:14px 16px; margin-bottom:18px;\">\n          <div style=\"font-weight:900; color:#5A2C8A; font-size:15px; margin-bottom:4px;\">🤖 אנדרואיד · Chrome<\/div>\n          <div style=\"font-size:14px; color:#5B4A78; line-height:1.7;\">לוחצים על שלוש הנקודות למעלה, ובוחרים \"הוסף למסך הבית\".<\/div>\n        <\/div>\n        <button onclick=\"{{ closeInstall }}\" style=\"background:var(--accent); color:#fff; font-weight:900; font-size:17px; padding:15px; border:none; border-radius:16px; cursor:pointer; font-family:inherit; width:100%; box-shadow:0 6px 0 var(--accent-dark);\" style-active=\"transform:translateY(4px); box-shadow:0 2px 0 var(--accent-dark)\">הבנתי, תודה! 🎉<\/button>\n      <\/div>\n    <\/div>\n  <\/sc-if>\n\n  <!-- ADD CATEGORY MODAL -->\n  <sc-if value=\"{{ addOpen }}\" hint-placeholder-v esh = this.generateFreshIdeas(cat).filter(a => !existing.includes(a.text));\n        if (fresh.length === 0) break;\n        cat.activities.push(...fresh);\n        remaining = remaining.concat(fresh);\n        guard++;\n      }\n    }\n    const shuffled = [...remaining].sort(() => Math.random() - 0.5);\n    this.wheelSlices = shuffled.slice(0, 6);\n    this.persist();\n  }\n\n  layoutLabel(text, n, lr, baseFs) {\n    const words = text.split(' ');\n    const total = text.length;\n    const half = Math.PI*(360/n)/360;\n    let best = null;\n    for (let k=1;k<=4;k++){\n      if (k>words.length) break;\n      const lh0 = baseFs+2;\n      const radii=[]; for(let j=0;j<k;j++) radii.push(lr + ((k-1)/2 - j)*lh0);\n      const chords = radii.map(rr => 2*rr*Math.sin(half) - 10);\n      const totalChord = chords.reduce((a,b)=>a+b,0);\n      const lines=[]; let idx=0;\n      for (let j=0;j<k;j++){\n        const budget = Math.ceil(total * chords[j]/totalChord);\n        let cur='';\n        while (idx<words.length){\n          const cand = cur?cur+' '+words[idx]:words[idx];\n          if (cur && j<k-1 && cand.length>budget) break;\n          cur=cand; idx++;\n        }\n        if (cur) lines.push(cur);\n      }\n      if (idx<words.length) continue;\n      let fs = baseFs;\n      for (let j=0;j<lines.length;j++){\n        const f = chords[j]/(lines[j].length*0.52);\n        if (f<fs) fs=f;\n      }\n      fs = Math.floor(fs);\n      if (!best || fs>best.fs) best={lines:lines, fs:fs};\n    }\n    best.fs = Math.max(9, Math.min(baseFs, best.fs));\n    return best;\n  }\n\n  drawWheel() {\n    const box = document.getElementById('wheelBox');\n    if (!box) return;\n    const n = this.wheelSlices.length;\n    if (!n) { box.innerHTML = ''; return; }\n    const cx=150, cy=150, r=126, angleStep=360/n;\n    const fontSize = n<=4 ? 16 : n<=6 ? 14 : 12;\n    const lrAll=r*0.70;\n    const fits=this.wheelSlices.map(sl=>this.layoutLabel(sl.short||sl.text, n, lrAll, fontSize));\n    let fsAll=fontSize; for (const f of fits) if (f.fs<fsAll) fsAll=f.fs;\n    let paths = '';\n    for (let i=0;i<n;i++){\n      const sa=i*angleStep, ea=sa+angleStep;\n      const x1=cx+r*Math.cos(Math.PI*sa/180), y1=cy+r*Math.sin(Math.PI*sa/180);\n      const x2=cx+r*Math.cos(Math.PI*ea/180), y2=cy+r*Math.sin(Math.PI*ea/180);\n      const large = angleStep>180?1:0;\n      const color = this.wheelColors[i % this.wheelColors.length];\n      paths += '<path d=\"M'+cx+','+cy+' L'+x1+','+y1+' A'+r+','+r+' 0 '+large+',1 '+x2+','+y2+' Z\" fill=\"'+color+'\" stroke=\"white\" stroke-width=\"2.5\"/>';\n      const mid=sa+angleStep/2, lr=r*0.70;\n      const lx=cx+lr*Math.cos(Math.PI*mid/180), ly=cy+lr*Math.sin(Math.PI*mid/180);\n      const lines=fits[i].lines, fs=fsAll;\n      const lh=fs+2, startY=-((lines.length-1)*lh)/2;\n      const tspans=lines.map((line,li)=>'<tspan x=\"0\" dy=\"'+(li===0?startY:lh)+'\">'+line+'<\/tspan>').join('');\n      paths += '<text font-size=\"'+fs+'\" font-weight=\"700\" fill=\"#2D1B4E\" text-anchor=\"middle\" dominant-baseline=\"middle\" transform=\"translate('+lx+','+ly+') rotate('+(mid+90)+')\">'+tspans+'<\/text>';\n    }\n    // decorative rim + bulbs\n    let deco = '<circle cx=\"150\" cy=\"150\" r=\"'+(r+4)+'\" fill=\"none\" stroke=\"rgba(255,255,255,.9)\" stroke-width=\"3\"/>';\n    deco += '<circle cx=\"150\" cy=\"150\" r=\"'+(r+13)+'\" fill=\"none\" stroke=\"#FFD700\" stroke-width=\"2\" opacity=\".5\"/>';\n    const bulbs = 16, br = r + 13;\n    for (let i=0;i<bulbs;i++){\n      const a=(360/bulbs)*i;\n      const bx=cx+br*Math.cos(Math.PI*a/180), by=cy+br*Math.sin(Math.PI*a/180);\n      const col = i%2===0 ? '#FFD700' : '#FFFFFF';\n      deco += '<circle cx=\"'+bx.toFixed(1)+'\" cy=\"'+by.toFixed(1)+'\" r=\"4.2\" fill=\"'+col+'\" stroke=\"rgba(45,27,78,.18)\" stroke-width=\"1\"/>';\n    }\n    box.innerHTML = '<svg id=\"wheelSvg\" viewBox=\"0 0 300 300\" style=\"width:100%;height:100%;display:block;transition:none;transform:rotate(0deg);
